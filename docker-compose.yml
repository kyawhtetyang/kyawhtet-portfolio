services:
  frontend:
    build:
      context: ./frontend
    command: npm run dev -- --host 0.0.0.0
    env_file:
      - ./frontend/.env.local
    ports:
      - "5173:5173"
    working_dir: /app
    volumes:
      - ./frontend:/app

  backend:
    build:
      context: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    working_dir: /app
    volumes:
      - ./backend:/app
